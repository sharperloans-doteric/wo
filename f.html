
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Message</title>
<meta name="theme-color" content="#000000">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #201f1f;
  border-bottom: 1px solid #333;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: #4CAF50;
}
.page-content {
  flex: 1;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  padding: 20px 15px;
}
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  margin-bottom: 8px;
  color: #aaa;
  font-size: 14px;
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #444;
  border-radius: 10px;
  background: #1a1919;
  color: #fff;
  font-size: 16px;
}
.form-input:focus {
  outline: none;
  border-color: #4CAF50;
}
.form-textarea {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #444;
  border-radius: 10px;
  background: #1a1919;
  color: #fff;
  font-size: 16px;
  min-height: 120px;
  resize: vertical;
}
.form-textarea:focus {
  outline: none;
  border-color: #4CAF50;
}
.send-btn {
  width: 100%;
  padding: 16px;
  background: #4CAF50;
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.send-btn:hover {
  background: #45a049;
}
.send-btn:disabled {
  background: #444;
  color: #888;
  cursor: not-allowed;
}
.success-message {
  background: #1a3d1a;
  color: #4caf50;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
}
.error-message {
  background: #3d1a1a;
  color: #f44336;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">Send Message</h1>
</div>

<div class="page-content">
  <div id="messageArea"></div>
  
  <form id="messageForm">
    <div class="form-group">
      <label class="form-label">Phone Number (This will be the ID)</label>
      <input type="tel" class="form-input" id="phone" placeholder="e.g., 254712345678" required>
    </div>
    
    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-textarea" id="message" placeholder="Enter your message..." required></textarea>
    </div>
    
    <button type="submit" class="send-btn" id="sendBtn">Send</button>
  </form>
</div>

<script>
// Use localhost for local development
const API = "http://localhost:3000";

document.getElementById('messageForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const phone = document.getElementById('phone').value.trim();
  const message = document.getElementById('message').value.trim();
  const sendBtn = document.getElementById('sendBtn');
  const messageArea = document.getElementById('messageArea');
  
  if (!phone || !message) {
    messageArea.innerHTML = '<div class="error-message">Please fill in all required fields</div>';
    return;
  }
  
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  messageArea.innerHTML = '';
  
  try {
    const response = await fetch(`${API}/api/messages`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        phone: phone,
        message: message,
        type: 'deducted'
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      messageArea.innerHTML = '<div class="success-message">Message sent successfully!</div>';
      document.getElementById('messageForm').reset();
    } else {
      messageArea.innerHTML = '<div class="error-message">' + (data.error || 'Failed to send message') + '</div>';
    }
  } catch (err) {
    console.error('Error:', err);
    messageArea.innerHTML = '<div class="error-message">Network error. Make sure server is running.</div>';
  }
  
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
});
</script>
</body>
</html>
