<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.messages-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #201f1f;
  border-bottom: 1px solid #333;
  padding: 10px 15px;
  z-index: 100;
  display: flex;
  align-items: center;
  height: 50px;
}
.header-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #25d366;
}
.page-content {
  margin-top: 50px;
  flex: 1;
  max-width: 500px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  background: #1a1919;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.messages-container {
  background: #000;
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}
.message-bubble {
  max-width: 90%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  background: #201f1f;
  border: 1px solid #333;
  margin-bottom: 12px;
  line-height: 1.4;
  animation: slideIn 0.3s ease;
}
.message-time {
  font-size: 10px;
  opacity: 0.5;
  margin-top: 6px;
  text-align: right;
}
.loading-text {
  text-align: center;
  color: #888;
  margin-top: 20px;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="messages-header">
  <h1 class="header-title">Messages: 1111</h1>
</div>

<div class="page-content">
  <div class="messages-container" id="messages">
    <div class="loading-text">Loading messages...</div>
  </div>
</div>

<script>
const API = "https://message-server-five.vercel.app";
const TARGET_PHONE = "1111"; // Hardcoded account

async function loadMessages() {
  const container = document.getElementById("messages");
  
  try {
    // Fetch directly using the hardcoded ID
    let res = await fetch(`${API}/api/messages/${TARGET_PHONE}`);
    let data = await res.json();
    
    container.innerHTML = ""; // Clear loading text

    if (data.success && data.messages && data.messages.length > 0) {
      renderMessages(data.messages);
    } else {
      // Fallback attempt
      res = await fetch(`${API}/transactions`);
      const txData = await res.json();
      const filtered = txData.filter(tx => tx.phone === TARGET_PHONE);
      
      if (filtered.length > 0) {
        renderMessages(filtered);
      } else {
        container.innerHTML = '<div class="loading-text">No messages found.</div>';
      }
    }
  } catch (err) {
    container.innerHTML = '<div class="loading-text" style="color:red;">Error loading messages. Check connection.</div>';
  }
}

function renderMessages(list) {
  const container = document.getElementById("messages");
  list.forEach(msg => {
    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    
    // Extract time or use current
    const timeMatch = msg.message.match(/at (\d{1,2}:\d{2} (?:AM|PM))/i);
    const displayTime = timeMatch ? timeMatch[1] : new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    bubble.innerHTML = `
      <div>${msg.message}</div>
      <div class="message-time">${displayTime}</div>
    `;
    container.appendChild(bubble);
  });
  
  // Auto scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// Execute immediately on load
window.onload = loadMessages;
</script>

</body>
</html>
