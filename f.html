
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
/* Header Section */
.messages-header {
  background: #201f1f;
  border-bottom: 1px solid #333;
  padding: 10px 15px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
#displayHeading {
  font-size: 1.2rem;
  font-weight: 600;
  color: #25d366;
  margin-bottom: 8px;
  display: block;
}
/* Heading Editor */
.header-setter {
  display: flex;
  gap: 5px;
  max-width: 400px;
  margin: 0 auto;
}
.header-input {
  flex: 1;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #000;
  color: #fff;
  font-size: 14px;
}
.set-btn {
  padding: 6px 12px;
  background: #333;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* Messages Area */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  background: #121212;
}
.message-bubble {
  max-width: 85%;
  padding: 12px 15px;
  border-radius: 15px;
  background: #1d1d1d;
  border: 1px solid #2a2a2a;
  margin-bottom: 12px;
  line-height: 1.5;
  font-size: 15px;
  align-self: center;
}
.message-time {
  font-size: 10px;
  color: #888;
  margin-top: 5px;
  text-align: right;
}
.status-msg {
  text-align: center;
  color: #666;
  font-size: 14px;
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="messages-header">
  <span id="displayHeading">Inbox</span>
  <div class="header-setter">
    <input type="text" id="headingInput" class="header-input" placeholder="Change heading name...">
    <button class="set-btn" onclick="updateHeading()">Save</button>
  </div>
</div>

<div class="messages-container" id="messages">
  <div class="status-msg">Fetching messages...</div>
</div>

<script>
const API = "https://message-server-five.vercel.app";
const HARDCODED_ID = "1"; // Hardcoded search ID

// --- Heading Logic ---
function updateHeading() {
  const newTitle = document.getElementById('headingInput').value.trim();
  if (newTitle) {
    document.getElementById('displayHeading').innerText = newTitle;
    localStorage.setItem('custom_heading', newTitle);
    document.getElementById('headingInput').value = "";
  }
}

// Load saved heading on start
const savedHeading = localStorage.getItem('custom_heading');
if (savedHeading) document.getElementById('displayHeading').innerText = savedHeading;

// --- Message Logic ---
async function fetchMessages() {
  const container = document.getElementById("messages");
  
  try {
    const res = await fetch(`${API}/api/messages/${HARDCODED_ID}`);
    const data = await res.json();
    
    container.innerHTML = "";

    if (data.success && data.messages.length > 0) {
      data.messages.forEach(msg => {
        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        
        const timeMatch = msg.message.match(/at (\d{1,2}:\d{2} (?:AM|PM))/i);
        const time = timeMatch ? timeMatch[1] : "Recently";

        bubble.innerHTML = `
          <div>${msg.message}</div>
          <div class="message-time">${time}</div>
        `;
        container.appendChild(bubble);
      });
      container.scrollTop = container.scrollHeight;
    } else {
      container.innerHTML = '<div class="status-msg">No messages found for ID 1.</div>';
    }
  } catch (err) {
    container.innerHTML = '<div class="status-msg" style="color: #ff6b6b;">Failed to load messages.</div>';
  }
}

// Auto-run on load
window.onload = fetchMessages;
</script>

</body>
</html>
